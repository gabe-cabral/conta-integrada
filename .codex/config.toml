[windows]
sandbox = "elevated"

[mcp_servers.azure_devops]
command = "npx"
args = [
  "-y",
  "@azure-devops/mcp",
  "nexsolab",
  "-d",
  "core", "work", "work-items", "repositories", "pipelines", "wiki",
]
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.azure_devops.env]
ado_mcp_project = "Conta Integrada"
ado_mcp_team = "Nome do Time"
